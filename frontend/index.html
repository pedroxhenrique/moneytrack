<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyTrack — Login</title>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { background: var(--fundo); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: var(--gap-md); }
    .auth-wrap { width: 100%; max-width: 400px; }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: var(--gap-xl); }
    .auth-logo-icon { width: 44px; height: 44px; background: var(--azul); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; box-shadow: var(--sombra-azul); }
    .auth-logo-icon i { font-size: 22px; color: #fff; }
    .auth-logo-text { font-size: var(--text-2xl); font-weight: 800; color: var(--texto-principal); letter-spacing: -0.5px; }
    .auth-logo-text span { color: var(--azul); }
    .auth-card { background: var(--surface); border: 1px solid var(--borda); border-radius: var(--radius-xl); padding: var(--gap-xl); box-shadow: var(--sombra-md); }
    .auth-title { font-size: var(--text-2xl); font-weight: 800; color: var(--texto-principal); margin-bottom: 4px; letter-spacing: -0.3px; }
    .auth-subtitle { font-size: var(--text-sm); color: var(--texto-muted); margin-bottom: var(--gap-xl); }
    .btn-auth { width: 100%; padding: 13px; font-size: var(--text-base); margin-top: var(--gap-sm); }
    .auth-link { text-align: center; margin-top: var(--gap-lg); font-size: var(--text-sm); color: var(--texto-muted); }
    .auth-link a { color: var(--azul-escuro); font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="ti ti-trending-up"></i></div>
    <div class="auth-logo-text">Money<span>Track</span></div>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Bem-vindo de volta</h1>
    <p class="auth-subtitle">Entre na sua conta para continuar</p>
    <div id="alerta" class="alert alert-hidden"></div>
    <form id="form-login">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <input class="form-input" type="password" id="senha" placeholder="Sua senha" required style="padding-right:44px" autocomplete="current-password">
          <button type="button" class="input-toggle" onclick="toggleSenha()"><i class="ti ti-eye" id="eye-icon"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-auth" id="btn-login"><i class="ti ti-login"></i> Entrar</button>
    </form>
    <div class="auth-link">Não tem conta? <a href="pages/cadastro.html">Criar conta grátis</a></div>
  </div>
</div>
<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script>
  if (localStorage.getItem('mt_token')) window.location.href = 'pages/dashboard.html';
  function toggleSenha() {
    const i = document.getElementById('senha'), ic = document.getElementById('eye-icon');
    i.type = i.type === 'password' ? 'text' : 'password';
    ic.className = i.type === 'password' ? 'ti ti-eye' : 'ti ti-eye-off';
  }
  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin .7s linear infinite"></i> Entrando...';
    try {
      const res = await api.auth.login({ email: document.getElementById('email').value, senha: document.getElementById('senha').value });
      if (res && res.ok) { salvarLogin(res.data.dados.token, res.data.dados.usuario); window.location.href = 'pages/dashboard.html'; }
      else { mostrarAlerta('alerta', res?.data?.mensagem || 'E-mail ou senha inválidos', 'erro'); btn.disabled = false; btn.innerHTML = '<i class="ti ti-login"></i> Entrar'; }
    } catch(err) { mostrarAlerta('alerta', 'Erro ao conectar. Verifique se o servidor está rodando.', 'erro'); btn.disabled = false; btn.innerHTML = '<i class="ti ti-login"></i> Entrar'; }
  });
</script>
</body>
</html>
